<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贺卡生成器(卖家内部工具)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--accent:#e0526e;--bg:#faf7f4;--card:#fff;--ink:#3f3a38;--ink-soft:#8c8480;--line:#eee5dd}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink)}
.wrap{max-width:1100px;margin:0 auto;padding:28px 20px 80px;display:grid;grid-template-columns:1fr 380px;gap:28px}
@media (max-width:900px){.wrap{grid-template-columns:1fr}}
h1{font-size:22px;grid-column:1/-1}
h1 small{font-size:13px;color:var(--ink-soft);font-weight:400;margin-left:10px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px}
.sec{margin-bottom:26px}
.sec h2{font-size:14px;letter-spacing:1px;margin-bottom:12px;color:var(--ink)}
.sec h2 i{font-style:normal;color:var(--accent);margin-right:6px}

.theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.theme-card{border:2px solid var(--line);border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;background:#fff;transition:.15s}
.theme-card.on{border-color:var(--accent);background:#fdf3f5}
.theme-card .name{font-size:13px;margin-top:4px}
.theme-card svg{width:64px;height:64px}

.swatches{display:flex;gap:10px;flex-wrap:wrap}
.sw{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.15s}
.sw.on{border-color:var(--ink);transform:scale(1.12)}

label.fl{display:block;font-size:13px;color:var(--ink-soft);margin:12px 0 6px}
input[type=text],textarea,input[type=number]{
  width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;
  font-size:14px;font-family:inherit;background:#fffdfb}
textarea{min-height:130px;line-height:1.8;resize:vertical}
input:focus,textarea:focus{outline:none;border-color:var(--accent)}
.row{display:flex;gap:12px}.row>div{flex:1}

.uploader{border:2px dashed var(--line);border-radius:12px;padding:18px;text-align:center;cursor:pointer;color:var(--ink-soft);font-size:13px}
.uploader:hover{border-color:var(--accent)}
.thumbs{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.thumb{position:relative;width:74px;height:74px;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb .del{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;border:none;background:rgba(0,0,0,.55);color:#fff;font-size:11px;line-height:18px;cursor:pointer}

.btn{display:inline-block;border:none;border-radius:999px;padding:12px 28px;font-size:15px;cursor:pointer;letter-spacing:1px}
.btn-main{background:var(--accent);color:#fff;box-shadow:0 5px 14px rgba(224,82,110,.35)}
.btn-ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
.btn+.btn{margin-left:10px}

.preview-box{position:sticky;top:20px}
.phone{width:320px;height:600px;margin:0 auto;border:10px solid #2c2825;border-radius:36px;overflow:hidden;background:#fff;box-shadow:0 18px 50px rgba(0,0,0,.18)}
.phone iframe{width:100%;height:100%;border:none}
.preview-tip{text-align:center;font-size:12px;color:var(--ink-soft);margin-top:10px}

#result{display:none;margin-top:20px;border-top:1px dashed var(--line);padding-top:20px}
#result h2{font-size:15px;margin-bottom:10px}
.kv{font-size:13px;line-height:2;background:#fbf6f1;border-radius:10px;padding:12px 14px;word-break:break-all}
.kv b{color:var(--accent)}
#qrbox{margin:14px auto;width:180px;height:180px;background:#fff;padding:8px;border:1px solid var(--line);border-radius:10px}
#qrbox img,#qrbox canvas{width:100%!important;height:100%!important}
ol.steps{font-size:13px;color:var(--ink-soft);line-height:2;padding-left:18px;margin-top:8px}
ol.steps code{background:#f3ece5;padding:1px 6px;border-radius:5px;color:var(--ink)}
</style>
</head>
<body>
<div class="wrap">
  <h1>🎁 贺卡生成器 <small>内部工具 · 不要把这个页面发给买家</small></h1>

  <div class="panel">
    <div class="sec">
      <h2><i>01</i>选择主题</h2>
      <div class="theme-grid" id="themeGrid"></div>
    </div>

    <div class="sec">
      <h2><i>02</i>主题色(8选1)</h2>
      <div class="swatches" id="swatches"></div>
    </div>

    <div class="sec">
      <h2><i>03</i>填写信息</h2>
      <div class="row">
        <div><label class="fl">收件人昵称(必填)</label><input type="text" id="fTo" placeholder="如:月亮" maxlength="12"></div>
        <div><label class="fl">落款 / 赠送人</label><input type="text" id="fFrom" placeholder="如:永远爱你的某某" maxlength="20"></div>
      </div>
      <label class="fl">主标题(留空则用主题默认,如"生日快乐")</label>
      <input type="text" id="fTitle" placeholder="生日快乐" maxlength="14">
      <label class="fl">祝福语(支持换行,最多 2000 字)</label>
      <textarea id="fText" maxlength="2000" placeholder="亲爱的月亮:&#10;又是一年,愿你被这个世界温柔以待……"></textarea>
      <label class="fl">结尾一句话(留空用默认)</label>
      <input type="text" id="fEnd" placeholder="愿所有美好如期而至" maxlength="30">
    </div>

    <div class="sec">
      <h2><i>04</i>照片(最多 9 张,自动压缩)</h2>
      <div class="uploader" id="uploader">点击选择照片,或拖拽到这里</div>
      <input type="file" id="fileInput" accept="image/*" multiple hidden>
      <div class="thumbs" id="thumbs"></div>
    </div>

    <div class="sec">
      <h2><i>05</i>背景音乐</h2>
      <div id="bgmList"></div>
      <div class="row" style="margin-top:8px">
        <div>
          <label class="fl">或上传自己的 MP3(注意版权,勿用流行歌曲)</label>
          <input type="file" id="bgmFile" accept="audio/mpeg,audio/mp3">
        </div>
      </div>
    </div>

    <div class="sec">
      <h2><i>06</i>有效期与站点</h2>
      <div class="row">
        <div><label class="fl">有效期(天,0=永久)</label><input type="number" id="fDays" value="30" min="0" max="3650"></div>
        <div><label class="fl">站点域名(自动检测,一般不用改)</label><input type="text" id="fSite" placeholder="https://你的项目.pages.dev"></div>
      </div>
    </div>

    <button class="btn btn-main" id="genBtn">生成贺卡</button>
    <button class="btn btn-ghost" id="previewBtn">刷新预览</button>

    <div id="result">
      <h2>✅ 生成完成 — 按下面 3 步交付</h2>
      <div class="kv" id="kvBox"></div>
      <div id="qrbox"></div>
      <div style="text-align:center">
        <button class="btn btn-ghost" id="dlQr">下载二维码</button>
        <button class="btn btn-ghost" id="dlJson">下载 JSON</button>
        <button class="btn btn-ghost" id="dlPhotos">下载照片/音乐素材</button>
      </div>
      <ol class="steps">
        <li>把 <code>编号.json</code> 放进项目 <code>data/</code> 文件夹</li>
        <li>把照片(及自定义 <code>bgm.mp3</code>)放进 <code>data/编号/</code> 文件夹</li>
        <li><code>git push</code> 部署后,把二维码图发给买家即可</li>
      </ol>
    </div>
  </div>

  <div class="preview-box">
    <div class="phone"><iframe id="pv" src="about:blank"></iframe></div>
    <div class="preview-tip">实时预览(照片以本机预览图显示)</div>
  </div>
</div>

<script>
const THEMES = [
  {key:"birthday", name:"生日派对"},
  {key:"love",     name:"浪漫心动"},
  {key:"starry",   name:"温馨星空"},
];
const COLORS = [
  {key:"cherry", c:"#e0526e", name:"樱桃粉"},
  {key:"avocado",c:"#6f9a4d", name:"牛油果绿"},
  {key:"blue",   c:"#4f7faa", name:"雾霾蓝"},
  {key:"taro",   c:"#8268b8", name:"香芋紫"},
  {key:"peach",  c:"#e0824a", name:"蜜桃橙"},
  {key:"mint",   c:"#3f9583", name:"薄荷青"},
  {key:"cream",  c:"#c2992e", name:"奶油黄"},
  {key:"cocoa",  c:"#8a6246", name:"可可棕"},
];
/* 缩略 SVG:直接复用主题首字符圆形占位 + emoji */
const ICONS = {birthday:"🐻🎂", love:"🐰💗", starry:"🐱🌙"};

let state = { theme:"birthday", color:"cherry", photos:[], bgm:"none", bgmBlob:null }; // photos: {blob,dataUrl}

/* ---------- 背景音乐 ---------- */
const BGMS = [
  {key:"none", name:"无音乐", src:""},
  {key:"birthday", name:"生日快乐(音乐盒)", src:"assets/bgm/birthday.mp3"},
  {key:"love",     name:"浪漫旋律(原创)",   src:"assets/bgm/love.mp3"},
  {key:"starry",   name:"小星星(音乐盒)",   src:"assets/bgm/starry.mp3"},
  {key:"custom",   name:"自定义上传", src:""},
];
let auditionAudio = null;
const bgmList = document.getElementById("bgmList");
BGMS.forEach(b=>{
  const row = document.createElement("label");
  row.style.cssText = "display:flex;align-items:center;gap:8px;font-size:14px;padding:6px 2px;cursor:pointer";
  row.innerHTML = `<input type="radio" name="bgm" value="${b.key}" ${b.key===state.bgm?"checked":""}> ${b.name}` +
    (b.src? ` <button type="button" class="btn-ghost btn" style="padding:3px 14px;font-size:12px" data-src="${b.src}">试听</button>` : "");
  row.querySelector("input").onchange = ()=>{ state.bgm = b.key; };
  const pl = row.querySelector("button");
  if(pl) pl.onclick = (e)=>{
    e.preventDefault();
    if(auditionAudio && !auditionAudio.paused && auditionAudio.__src===b.src){ auditionAudio.pause(); return; }
    if(auditionAudio) auditionAudio.pause();
    auditionAudio = new Audio(b.src); auditionAudio.__src = b.src; auditionAudio.play();
  };
  bgmList.appendChild(row);
});
document.getElementById("bgmFile").onchange = e=>{
  const f = e.target.files[0];
  if(!f) return;
  if(f.size > 5*1024*1024){ alert("音乐文件请控制在 5MB 以内"); e.target.value=""; return; }
  state.bgmBlob = f; state.bgm = "custom";
  document.querySelector('input[name="bgm"][value="custom"]').checked = true;
};


const themeGrid = document.getElementById("themeGrid");
THEMES.forEach(t=>{
  const d = document.createElement("div");
  d.className = "theme-card" + (t.key===state.theme?" on":"");
  d.innerHTML = `<div style="font-size:30px">${ICONS[t.key]}</div><div class="name">${t.name}</div>`;
  d.onclick = ()=>{ state.theme=t.key;
    [...themeGrid.children].forEach(c=>c.classList.remove("on")); d.classList.add("on"); refreshPreview(); };
  themeGrid.appendChild(d);
});

const swBox = document.getElementById("swatches");
COLORS.forEach(c=>{
  const s = document.createElement("div");
  s.className = "sw" + (c.key===state.color?" on":"");
  s.style.background = c.c; s.title = c.name;
  s.onclick = ()=>{ state.color=c.key;
    [...swBox.children].forEach(x=>x.classList.remove("on")); s.classList.add("on"); refreshPreview(); };
  swBox.appendChild(s);
});

/* ---------- 照片:客户端压缩 ---------- */
const fileInput = document.getElementById("fileInput");
const uploader = document.getElementById("uploader");
uploader.onclick = ()=>fileInput.click();
uploader.ondragover = e=>{e.preventDefault();};
uploader.ondrop = e=>{e.preventDefault(); addFiles(e.dataTransfer.files);};
fileInput.onchange = ()=>addFiles(fileInput.files);

async function addFiles(files){
  for(const f of [...files]){
    if(state.photos.length>=9) break;
    if(!f.type.startsWith("image/")) continue;
    const {blob,dataUrl} = await compress(f, 1280, .82);
    state.photos.push({blob,dataUrl});
  }
  renderThumbs(); refreshPreview();
}
function compress(file,maxSide,q){
  return new Promise(res=>{
    const img = new Image();
    img.onload = ()=>{
      const r = Math.min(1, maxSide/Math.max(img.width,img.height));
      const cv = document.createElement("canvas");
      cv.width = Math.round(img.width*r); cv.height = Math.round(img.height*r);
      cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
      cv.toBlob(blob=>res({blob, dataUrl:cv.toDataURL("image/jpeg",.6)}), "image/jpeg", q);
    };
    img.src = URL.createObjectURL(file);
  });
}
function renderThumbs(){
  const box = document.getElementById("thumbs"); box.innerHTML="";
  state.photos.forEach((p,i)=>{
    const d = document.createElement("div"); d.className="thumb";
    d.innerHTML = `<img src="${p.dataUrl}"><button class="del">×</button>`;
    d.querySelector(".del").onclick = ()=>{ state.photos.splice(i,1); renderThumbs(); refreshPreview(); };
    box.appendChild(d);
  });
}

/* ---------- 配置构建 ---------- */
function buildCfg(forPreview){
  const days = parseInt(document.getElementById("fDays").value||"0",10);
  return {
    theme: state.theme, color: state.color,
    to: document.getElementById("fTo").value.trim(),
    from: document.getElementById("fFrom").value.trim(),
    title: document.getElementById("fTitle").value.trim(),
    blessing: document.getElementById("fText").value,
    endText: document.getElementById("fEnd").value.trim(),
    photos: forPreview ? state.photos.map(p=>p.dataUrl) : [],   // 正式版填相对路径
    bgm: (state.bgm!=="none" && state.bgm!=="custom") ? `assets/bgm/${state.bgm}.mp3` : "",
    createdAt: new Date().toISOString(),
    expireAt: days>0 ? new Date(Date.now()+days*864e5).toISOString() : ""
  };
}
function b64(obj){ return btoa(unescape(encodeURIComponent(JSON.stringify(obj)))); }

function refreshPreview(){
  document.getElementById("pv").src = "card.html#cfg=" + b64(buildCfg(true));
}
document.getElementById("previewBtn").onclick = refreshPreview;
["fTo","fFrom","fTitle","fText","fEnd"].forEach(id=>{
  document.getElementById(id).addEventListener("change", refreshPreview);
});

/* ---------- 生成 ---------- */
let lastId=null, lastJson=null, lastUrl=null;
document.getElementById("genBtn").onclick = ()=>{
  const to = document.getElementById("fTo").value.trim();
  if(!to){ alert("请填写收件人昵称"); return; }
  let site = document.getElementById("fSite").value.trim().replace(/\/+$/,"");
  if(!site && location.protocol.startsWith("http") && !location.hostname.match(/^(localhost|127\.)/))
    site = location.origin;
  if(!site){ alert("无法自动检测站点域名,请手动填写(如 https://card-rust-phi.vercel.app)"); return; }
  document.getElementById("fSite").value = site;
  localStorage.setItem("ecard_site", site);

  lastId = randId();
  const cfg = buildCfg(false);
  cfg.photos = state.photos.map((_,i)=>`data/${lastId}/${i+1}.jpg`);
  if(state.bgm==="custom" && state.bgmBlob) cfg.bgm = `data/${lastId}/bgm.mp3`;
  lastJson = JSON.stringify(cfg, null, 2);
  lastUrl = `${site}/card.html?id=${lastId}`;

  document.getElementById("kvBox").innerHTML =
    `贺卡编号:<b>${lastId}</b><br>访问链接:<b>${lastUrl}</b><br>有效期至:<b>${cfg.expireAt? cfg.expireAt.slice(0,10) : "永久"}</b>`;
  const qr = document.getElementById("qrbox"); qr.innerHTML="";
  new QRCode(qr, {text:lastUrl, width:164, height:164, correctLevel:QRCode.CorrectLevel.M});
  document.getElementById("result").style.display="block";
  document.getElementById("result").scrollIntoView({behavior:"smooth"});
};
function randId(){
  const s="abcdefghjkmnpqrstuvwxyz23456789"; let r="";
  for(let i=0;i<7;i++) r+=s[Math.floor(Math.random()*s.length)];
  return r;
}

/* 下载 */
function dl(name, blob){
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = name; a.click();
}
document.getElementById("dlJson").onclick = ()=>{
  if(!lastJson) return;
  dl(`${lastId}.json`, new Blob([lastJson],{type:"application/json"}));
};
document.getElementById("dlPhotos").onclick = ()=>{
  state.photos.forEach((p,i)=> setTimeout(()=>dl(`${i+1}.jpg`, p.blob), i*350));
  if(state.bgm==="custom" && state.bgmBlob)
    setTimeout(()=>dl("bgm.mp3", state.bgmBlob), state.photos.length*350+200);
};
document.getElementById("dlQr").onclick = ()=>{
  const img = document.querySelector("#qrbox img") || document.querySelector("#qrbox canvas");
  if(!img) return;
  const src = img.tagName==="IMG" ? img.src : img.toDataURL();
  fetch(src).then(r=>r.blob()).then(b=>dl(`二维码_${lastId}.png`, b));
};

/* 初始化 */
/* 站点域名:优先用已保存的,否则自动检测当前访问域名 */
(function(){
  const saved = localStorage.getItem("ecard_site");
  const auto = (location.protocol==="https:" || location.protocol==="http:") && !location.hostname.match(/^(localhost|127\.)/)
    ? location.origin : "";
  document.getElementById("fSite").value = saved || auto || "";
})();
refreshPreview();
</script>
</body>
</html>
