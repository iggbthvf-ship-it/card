<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贺卡生成器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--accent:#e0526e;--bg:#faf7f4;--card:#fff;--ink:#3f3a38;--ink-soft:#8c8480;--line:#eee5dd}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink)}
.wrap{max-width:1100px;margin:0 auto;padding:28px 20px 80px;display:grid;grid-template-columns:1fr 380px;gap:28px}
@media(max-width:900px){.wrap{grid-template-columns:1fr}}
h1{font-size:22px;grid-column:1/-1}
h1 small{font-size:13px;color:var(--ink-soft);font-weight:400;margin-left:10px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px}
.sec{margin-bottom:26px}
.sec h2{font-size:14px;letter-spacing:1px;margin-bottom:12px;color:var(--ink)}
.sec h2 i{font-style:normal;color:var(--accent);margin-right:6px}
.theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.theme-card{border:2px solid var(--line);border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;background:#fff;transition:.15s}
.theme-card.on{border-color:var(--accent);background:#fdf3f5}
.theme-card .name{font-size:13px;margin-top:4px}
.swatches{display:flex;gap:10px;flex-wrap:wrap}
.sw{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.15s}
.sw.on{border-color:var(--ink);transform:scale(1.12)}
label.fl{display:block;font-size:13px;color:var(--ink-soft);margin:12px 0 6px}
input[type=text],textarea,input[type=number]{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:14px;font-family:inherit;background:#fffdfb}
textarea{min-height:130px;line-height:1.8;resize:vertical}
input:focus,textarea:focus{outline:none;border-color:var(--accent)}
.row{display:flex;gap:12px}.row>div{flex:1}
.uploader{border:2px dashed var(--line);border-radius:12px;padding:18px;text-align:center;cursor:pointer;color:var(--ink-soft);font-size:13px}
.uploader:hover{border-color:var(--accent)}
.thumbs{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.thumb{position:relative;width:74px;height:74px;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb .del{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;border:none;background:rgba(0,0,0,.55);color:#fff;font-size:11px;line-height:18px;cursor:pointer}
.btn{display:inline-block;border:none;border-radius:999px;padding:12px 28px;font-size:15px;cursor:pointer;letter-spacing:1px}
.btn-main{background:var(--accent);color:#fff;box-shadow:0 5px 14px rgba(224,82,110,.35)}
.btn-ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
.btn+.btn{margin-left:10px}
.preview-box{position:sticky;top:20px}
.phone{width:320px;height:600px;margin:0 auto;border:10px solid #2c2825;border-radius:36px;overflow:hidden;background:#fff;box-shadow:0 18px 50px rgba(0,0,0,.18)}
.phone iframe{width:100%;height:100%;border:none}
.preview-tip{text-align:center;font-size:12px;color:var(--ink-soft);margin-top:10px}
#result{display:none;margin-top:20px;border-top:1px dashed var(--line);padding-top:20px}
#result h2{font-size:15px;margin-bottom:10px}
.link-box{font-size:13px;background:#fbf6f1;border-radius:10px;padding:12px 14px;word-break:break-all;margin-bottom:12px}
.link-box b{color:var(--accent)}
#qrbox{margin:14px auto;width:200px;height:200px;background:#fff;padding:8px;border:1px solid var(--line);border-radius:10px}
#qrbox img,#qrbox canvas{width:100%!important;height:100%!important}
.warn{font-size:12px;color:#c0392b;margin:6px 0;display:none}
.bgm-row{display:flex;align-items:center;gap:8px;font-size:14px;padding:6px 2px;cursor:pointer}
.bgm-row button{padding:3px 14px;font-size:12px;border:1px solid var(--line);border-radius:999px;background:#fff;cursor:pointer}
.photo-note{font-size:12px;color:var(--ink-soft);margin-top:8px;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <h1>🎁 贺卡生成器 <small>生成后直接发二维码或链接给买家</small></h1>
  <div class="panel">
    <div class="sec">
      <h2><i>01</i>选择主题</h2>
      <div class="theme-grid" id="themeGrid"></div>
    </div>
    <div class="sec">
      <h2><i>02</i>主题色</h2>
      <div class="swatches" id="swatches"></div>
    </div>
    <div class="sec">
      <h2><i>03</i>填写信息</h2>
      <div class="row">
        <div><label class="fl">收件人昵称(必填)</label><input type="text" id="fTo" placeholder="如:月亮" maxlength="12"></div>
        <div><label class="fl">落款 / 赠送人</label><input type="text" id="fFrom" placeholder="如:永远爱你的某某" maxlength="20"></div>
      </div>
      <label class="fl">主标题(留空则用主题默认)</label>
      <input type="text" id="fTitle" placeholder="生日快乐" maxlength="14">
      <label class="fl">祝福语(支持换行)</label>
      <textarea id="fText" maxlength="2000" placeholder="亲爱的月亮:&#10;又是一年,愿你被这个世界温柔以待……"></textarea>
      <label class="fl">结尾一句话(留空用默认)</label>
      <input type="text" id="fEnd" placeholder="愿所有美好如期而至" maxlength="30">
    </div>
    <div class="sec">
      <h2><i>04</i>照片(可选,最多 4 张)</h2>
      <div class="uploader" id="uploader">点击选择照片,或拖拽到这里</div>
      <input type="file" id="fileInput" accept="image/*" multiple hidden>
      <div class="thumbs" id="thumbs"></div>
      <div class="photo-note">照片会被压缩嵌入链接,建议选 1~4 张,太多会导致二维码过密无法扫描。<br>无照片时二维码最清晰,推荐微信直接发链接。</div>
    </div>
    <div class="sec">
      <h2><i>05</i>背景音乐</h2>
      <div id="bgmList"></div>
    </div>
    <div class="sec">
      <h2><i>06</i>有效期</h2>
      <label class="fl">有效天数(0=永久)</label>
      <input type="number" id="fDays" value="30" min="0" max="3650" style="max-width:160px">
    </div>
    <button class="btn btn-main" id="genBtn">生成贺卡</button>
    <button class="btn btn-ghost" id="previewBtn">刷新预览</button>

    <div id="result">
      <h2>✅ 生成完成</h2>
      <div class="link-box" id="linkBox"></div>
      <div class="warn" id="qrWarn">⚠️ 含照片时二维码较密,建议直接复制链接发微信</div>
      <div id="qrbox"></div>
      <div style="text-align:center;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-ghost" id="dlQr">保存二维码图片</button>
        <button class="btn btn-main" id="copyLink">复制链接</button>
      </div>
      <div style="margin-top:14px;padding:14px;background:#f0faf0;border-radius:10px;font-size:13px;color:#3a6e3a;line-height:1.8">
        <b>交付方式(二选一):</b><br>
        ① 保存二维码图片 → 发给买家,买家微信扫码打开<br>
        ② 复制链接 → 直接微信发给买家,点击即可打开
      </div>
    </div>
  </div>

  <div class="preview-box">
    <div class="phone"><iframe id="pv" src="about:blank"></iframe></div>
    <div class="preview-tip">实时预览</div>
  </div>
</div>

<script>
/* ===== 和 card.html 一样的 Web Audio 合成器(用于试听) ===== */
const MELODIES={
  birthday:{bpm:100,notes:[[67,.75],[67,.25],[69,1],[67,1],[72,1],[71,2],[67,.75],[67,.25],[69,1],[67,1],[74,1],[72,2],[67,.75],[67,.25],[79,1],[76,1],[72,1],[71,1],[69,2],[77,.75],[77,.25],[76,1],[72,1],[74,1],[72,2]]},
  love:{bpm:92,notes:[[64,.5],[67,.5],[72,.5],[71,.5],[67,.5],[64,.5],[62,.5],[65,.5],[69,.5],[67,.5],[65,.5],[62,.5],[60,.5],[64,.5],[67,.5],[72,.5],[76,1],[74,.5],[72,.5],[71,.5],[67,.5],[69,2],[0,.5],[64,.5],[67,.5],[72,.5],[74,.5],[76,.5],[79,.5],[77,.5],[76,.5],[74,.5],[72,1.5],[69,.5],[71,.5],[72,.5],[74,.5],[71,.5],[67,.5],[72,2.5]]},
  starry:{bpm:88,notes:[[60,1],[60,1],[67,1],[67,1],[69,1],[69,1],[67,2],[65,1],[65,1],[64,1],[64,1],[62,1],[62,1],[60,2],[67,1],[67,1],[65,1],[65,1],[64,1],[64,1],[62,2],[67,1],[67,1],[65,1],[65,1],[64,1],[64,1],[62,2],[60,1],[60,1],[67,1],[67,1],[69,1],[69,1],[67,2],[65,1],[65,1],[64,1],[64,1],[62,1],[62,1],[60,2]]}
};
let previewAudioCtx=null, previewSource=null;
function previewMelody(key){
  if(previewSource){try{previewSource.stop();}catch(e){} previewSource=null;}
  if(!MELODIES[key]) return;
  if(!previewAudioCtx) previewAudioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const ctx=previewAudioCtx, sr=ctx.sampleRate, m=MELODIES[key], beat=60/m.bpm;
  let total=0; m.notes.forEach(n=>total+=n[1]*beat); total+=1;
  const buf=ctx.createBuffer(1,Math.ceil(sr*total),sr), ch=buf.getChannelData(0);
  let pos=0;
  m.notes.forEach(([midi,dur])=>{
    if(midi<=0){pos+=dur*beat;return;}
    const f=440*Math.pow(2,(midi-69)/12), nd=Math.min(dur*beat*2.2,2.5), ns=Math.floor(nd*sr);
    for(let i=0;i<ns&&Math.floor(pos*sr)+i<ch.length;i++){
      const t=i/sr, env=Math.exp(-3.2*t)*Math.min(1,t*200);
      const w=Math.sin(2*Math.PI*f*t)+.35*Math.sin(2*Math.PI*2*f*t)+.12*Math.sin(2*Math.PI*3*f*t);
      ch[Math.floor(pos*sr)+i]+=w*env*.45;
    }
    pos+=dur*beat;
  });
  let mx=0;for(let i=0;i<ch.length;i++)mx=Math.max(mx,Math.abs(ch[i]));
  if(mx>0)for(let i=0;i<ch.length;i++)ch[i]=ch[i]/mx*.8;
  previewSource=ctx.createBufferSource();previewSource.buffer=buf;
  previewSource.connect(ctx.destination);previewSource.start();
  setTimeout(()=>{if(previewSource)try{previewSource.stop();}catch(e){}},total*1000);
}

/* ===== 配置 ===== */
const THEMES=[{key:"birthday",name:"生日派对"},{key:"love",name:"浪漫心动"},{key:"starry",name:"温馨星空"}];
const COLORS=[
  {key:"cherry",c:"#e0526e",name:"樱桃粉"},{key:"avocado",c:"#6f9a4d",name:"牛油果绿"},
  {key:"blue",c:"#4f7faa",name:"雾霾蓝"},{key:"taro",c:"#8268b8",name:"香芋紫"},
  {key:"peach",c:"#e0824a",name:"蜜桃橙"},{key:"mint",c:"#3f9583",name:"薄荷青"},
  {key:"cream",c:"#c2992e",name:"奶油黄"},{key:"cocoa",c:"#8a6246",name:"可可棕"}
];
const BGMS=[
  {key:"",name:"无音乐"},{key:"birthday",name:"🎂 生日快乐(音乐盒)"},
  {key:"love",name:"💗 浪漫旋律(原创)"},{key:"starry",name:"🌙 小星星(音乐盒)"}
];
const ICONS={birthday:"🐻🎂",love:"🐰💗",starry:"🐱🌙"};

let state={theme:"birthday",color:"cherry",photos:[],bgm:""};

/* 主题选择 */
const themeGrid=document.getElementById("themeGrid");
THEMES.forEach(t=>{
  const d=document.createElement("div");
  d.className="theme-card"+(t.key===state.theme?" on":"");
  d.innerHTML=`<div style="font-size:30px">${ICONS[t.key]}</div><div class="name">${t.name}</div>`;
  d.onclick=()=>{state.theme=t.key;[...themeGrid.children].forEach(c=>c.classList.remove("on"));d.classList.add("on");refreshPreview();};
  themeGrid.appendChild(d);
});

/* 主题色 */
const swBox=document.getElementById("swatches");
COLORS.forEach(c=>{
  const s=document.createElement("div");
  s.className="sw"+(c.key===state.color?" on":"");
  s.style.background=c.c;s.title=c.name;
  s.onclick=()=>{state.color=c.key;[...swBox.children].forEach(x=>x.classList.remove("on"));s.classList.add("on");refreshPreview();};
  swBox.appendChild(s);
});

/* 音乐 */
const bgmList=document.getElementById("bgmList");
BGMS.forEach(b=>{
  const row=document.createElement("label");row.className="bgm-row";
  row.innerHTML=`<input type="radio" name="bgm" value="${b.key}" ${b.key===state.bgm?"checked":""}> ${b.name}`+(b.key?` <button type="button" data-key="${b.key}">试听</button>`:"");
  row.querySelector("input").onchange=()=>{state.bgm=b.key;};
  const pl=row.querySelector("button");
  if(pl)pl.onclick=e=>{e.preventDefault();previewMelody(b.key);};
  bgmList.appendChild(row);
});

/* 照片 */
const fileInput=document.getElementById("fileInput");
const uploader=document.getElementById("uploader");
uploader.onclick=()=>fileInput.click();
uploader.ondragover=e=>e.preventDefault();
uploader.ondrop=e=>{e.preventDefault();addFiles(e.dataTransfer.files);};
fileInput.onchange=()=>addFiles(fileInput.files);

async function addFiles(files){
  for(const f of[...files]){
    if(state.photos.length>=4)break;
    if(!f.type.startsWith("image/"))continue;
    const dataUrl=await compress(f,480,.45);
    state.photos.push(dataUrl);
  }
  renderThumbs();refreshPreview();
}
function compress(file,maxSide,q){
  return new Promise(res=>{
    const img=new Image();img.onload=()=>{
      const r=Math.min(1,maxSide/Math.max(img.width,img.height));
      const cv=document.createElement("canvas");
      cv.width=Math.round(img.width*r);cv.height=Math.round(img.height*r);
      cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
      res(cv.toDataURL("image/jpeg",q));
    };img.src=URL.createObjectURL(file);
  });
}
function renderThumbs(){
  const box=document.getElementById("thumbs");box.innerHTML="";
  state.photos.forEach((u,i)=>{
    const d=document.createElement("div");d.className="thumb";
    d.innerHTML=`<img src="${u}"><button class="del">×</button>`;
    d.querySelector(".del").onclick=()=>{state.photos.splice(i,1);renderThumbs();refreshPreview();};
    box.appendChild(d);
  });
}

/* 构建配置 */
function buildCfg(){
  const days=parseInt(document.getElementById("fDays").value||"0",10);
  return{
    theme:state.theme,color:state.color,
    to:document.getElementById("fTo").value.trim(),
    from:document.getElementById("fFrom").value.trim(),
    title:document.getElementById("fTitle").value.trim(),
    blessing:document.getElementById("fText").value,
    endText:document.getElementById("fEnd").value.trim(),
    photos:state.photos,
    bgm:state.bgm,
    expireAt:days>0?new Date(Date.now()+days*864e5).toISOString():""
  };
}
function toB64(obj){return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));}
function getSite(){return location.origin.replace(/\/+$/,"");}

function refreshPreview(){
  document.getElementById("pv").src="card.html#cfg="+toB64(buildCfg());
}
document.getElementById("previewBtn").onclick=refreshPreview;
["fTo","fFrom","fTitle","fText","fEnd"].forEach(id=>{
  document.getElementById(id).addEventListener("change",refreshPreview);
});

/* ===== 生成 ===== */
let lastUrl=null;
document.getElementById("genBtn").onclick=()=>{
  const to=document.getElementById("fTo").value.trim();
  if(!to){alert("请填写收件人昵称");return;}
  const cfg=buildCfg();
  const b64=toB64(cfg);
  lastUrl=getSite()+"/card.html#cfg="+b64;

  // 链接信息
  const days=parseInt(document.getElementById("fDays").value||"0",10);
  document.getElementById("linkBox").innerHTML=
    `有效期至:<b>${cfg.expireAt?cfg.expireAt.slice(0,10):"永久"}</b><br>链接长度:<b>${lastUrl.length} 字符</b>`;

  // 二维码
  const qr=document.getElementById("qrbox");qr.innerHTML="";
  const warn=document.getElementById("qrWarn");
  if(lastUrl.length>2500){
    warn.style.display="block";
    // 生成不含照片的短链接用于二维码
    const cfgShort={...cfg,photos:[]};
    const shortUrl=getSite()+"/card.html#cfg="+toB64(cfgShort);
    new QRCode(qr,{text:shortUrl,width:184,height:184,correctLevel:QRCode.CorrectLevel.L});
    warn.textContent="⚠️ 照片太多导致链接过长,二维码为无照片版。建议直接复制完整链接发微信。";
  }else{
    warn.style.display="none";
    new QRCode(qr,{text:lastUrl,width:184,height:184,correctLevel:lastUrl.length>1500?QRCode.CorrectLevel.L:QRCode.CorrectLevel.M});
  }
  document.getElementById("result").style.display="block";
  document.getElementById("result").scrollIntoView({behavior:"smooth"});
};

/* 复制链接 */
document.getElementById("copyLink").onclick=()=>{
  if(!lastUrl)return;
  navigator.clipboard.writeText(lastUrl).then(()=>alert("链接已复制!粘贴到微信发给买家即可")).catch(()=>{
    const ta=document.createElement("textarea");ta.value=lastUrl;document.body.appendChild(ta);ta.select();document.execCommand("copy");ta.remove();
    alert("链接已复制!");
  });
};

/* 下载二维码 */
document.getElementById("dlQr").onclick=()=>{
  const el=document.querySelector("#qrbox img")||document.querySelector("#qrbox canvas");
  if(!el)return;
  const src=el.tagName==="IMG"?el.src:el.toDataURL();
  const a=document.createElement("a");
  fetch(src).then(r=>r.blob()).then(b=>{a.href=URL.createObjectURL(b);a.download="贺卡二维码.png";a.click();});
};

refreshPreview();
</script>
</body>
</html>
