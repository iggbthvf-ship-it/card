<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>一封给你的贺卡</title>
<style>
:root{
  --accent:#e0526e; --accent-deep:#b93a54; --bg:#fdf1f3; --bg-soft:#fbe2e7;
  --card:#ffffff; --ink:#5a4a4e; --ink-soft:#9c8a8e;
}
/* ===== 8 套主题色 ===== */
[data-color="cherry"]{ --accent:#e0526e; --accent-deep:#b93a54; --bg:#fdf1f3; --bg-soft:#fbe2e7; --ink:#5a4a4e; --ink-soft:#9c8a8e;}
[data-color="avocado"]{--accent:#6f9a4d; --accent-deep:#557a38; --bg:#f4f8ee; --bg-soft:#e4efd6; --ink:#4a553e; --ink-soft:#8c9a7e;}
[data-color="blue"]{   --accent:#4f7faa; --accent-deep:#3a6388; --bg:#f0f5fa; --bg-soft:#dcebf6; --ink:#414e5a; --ink-soft:#83929f;}
[data-color="taro"]{   --accent:#8268b8; --accent-deep:#665093; --bg:#f5f2fa; --bg-soft:#e9e1f5; --ink:#4e4659; --ink-soft:#94899f;}
[data-color="peach"]{  --accent:#e0824a; --accent-deep:#bd6633; --bg:#fdf4ec; --bg-soft:#fae4d2; --ink:#5d4a3c; --ink-soft:#a08a78;}
[data-color="mint"]{   --accent:#3f9583; --accent-deep:#2e7665; --bg:#eef8f5; --bg-soft:#d8efe9; --ink:#3e5650; --ink-soft:#7e9a92;}
[data-color="cream"]{  --accent:#c2992e; --accent-deep:#9c7a1f; --bg:#fdf8ec; --bg-soft:#f8ecca; --ink:#5d5238; --ink-soft:#a39775;}
[data-color="cocoa"]{  --accent:#8a6246; --accent-deep:#6c4a33; --bg:#f8f2ed; --bg-soft:#eee0d4; --ink:#52443a; --ink-soft:#9a8a7c;}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:var(--bg); color:var(--ink); overflow:hidden;
}
.en{font-family:"Snell Roundhand","Segoe Script","Brush Script MT",cursive}

/* ===== 封面 ===== */
#cover{
  position:fixed; inset:0; z-index:50; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:18px; background:var(--bg);
  transition:opacity .8s ease, transform .8s ease; text-align:center; padding:24px;
}
#cover.gone{opacity:0; transform:translateY(-6%); pointer-events:none}
#cover .mascot{width:200px; height:200px; animation:bob 3s ease-in-out infinite}
#cover h1{font-size:30px; font-weight:600; letter-spacing:2px}
#cover h1 b{color:var(--accent); font-weight:700}
#cover .sub{font-size:14px; color:var(--ink-soft); letter-spacing:6px}
#openBtn{
  margin-top:14px; border:none; background:var(--accent); color:#fff;
  font-size:16px; letter-spacing:4px; padding:13px 42px; border-radius:999px;
  box-shadow:0 6px 18px color-mix(in srgb, var(--accent) 40%, transparent);
  animation:pulse 1.8s ease-in-out infinite; cursor:pointer;
}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* ===== 正文 ===== */
#stage{height:100%; overflow-y:auto; -webkit-overflow-scrolling:touch; position:relative; z-index:2}
.page{min-height:100%; padding:56px 26px 64px; display:flex; flex-direction:column; align-items:center}
.reveal{opacity:0; transform:translateY(24px); transition:opacity .9s ease, transform .9s ease}
.reveal.in{opacity:1; transform:none}

.head-mascot{width:150px;height:150px;margin-bottom:6px}
.title-en{font-size:34px; color:var(--accent); margin-bottom:2px}
.title-cn{font-size:24px; font-weight:700; letter-spacing:3px; margin-bottom:4px}
.to-line{font-size:14px; color:var(--ink-soft); margin-bottom:26px; letter-spacing:1px}

.letter{
  width:100%; max-width:430px; background:var(--card); border-radius:18px;
  padding:30px 24px 26px; position:relative;
  box-shadow:0 10px 30px color-mix(in srgb, var(--accent) 14%, transparent);
}
.letter::before{
  content:""; position:absolute; top:0; left:0; right:0; height:6px;
  border-radius:18px 18px 0 0;
  background:repeating-linear-gradient(45deg,var(--accent) 0 12px,var(--bg-soft) 12px 24px);
}
.letter .text{
  font-size:16px; line-height:2.05; white-space:pre-wrap; word-break:break-word;
  min-height:120px; letter-spacing:.5px;
}
.caret{display:inline-block; width:2px; height:1.05em; background:var(--accent);
  vertical-align:-0.15em; animation:blink .8s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
.letter .from{margin-top:22px; text-align:right; color:var(--ink-soft); font-size:14px}
.letter .from b{color:var(--accent); font-size:16px; margin-left:6px}

/* 照片 */
.photos{width:100%; max-width:430px; margin-top:40px; display:flex; flex-wrap:wrap; justify-content:center; gap:22px}
.polaroid{
  background:#fff; padding:10px 10px 30px; border-radius:6px;
  box-shadow:0 8px 22px rgba(0,0,0,.12); width:46%; min-width:140px; position:relative;
}
.polaroid:nth-child(odd){transform:rotate(-3deg)}
.polaroid:nth-child(even){transform:rotate(2.5deg); margin-top:14px}
.polaroid img{width:100%; aspect-ratio:1/1.05; object-fit:cover; border-radius:3px; display:block; background:var(--bg-soft)}
.polaroid::after{
  content:""; position:absolute; top:-9px; left:50%; transform:translateX(-50%) rotate(-2deg);
  width:54px; height:18px; background:color-mix(in srgb, var(--accent) 30%, #fff);
  opacity:.85; border-radius:2px;
}

/* 结尾 */
.ending{margin-top:54px; text-align:center}
.ending .mini{width:120px;height:120px}
.ending p{margin-top:8px; color:var(--ink-soft); font-size:13px; letter-spacing:2px}
.ending .en{font-size:26px; color:var(--accent); margin-top:4px}

/* 氛围画布 */
#fx{position:fixed; inset:0; z-index:1; pointer-events:none}

/* BGM 按钮 */
#bgmBtn{
  position:fixed; top:16px; right:16px; z-index:60; width:42px; height:42px;
  border-radius:50%; border:none; background:var(--card); color:var(--accent);
  box-shadow:0 4px 14px rgba(0,0,0,.12); font-size:18px; display:none;
  align-items:center; justify-content:center; cursor:pointer;
}
#bgmBtn.spin svg{animation:rot 3s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

/* 过期 / 错误页 */
.notice{
  position:fixed; inset:0; z-index:99; background:var(--bg); display:none;
  flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:30px; text-align:center;
}
.notice .mascot{width:140px;height:140px;opacity:.9}
.notice h2{font-size:20px; letter-spacing:2px}
.notice p{font-size:14px; color:var(--ink-soft); line-height:1.8}

@media (prefers-reduced-motion: reduce){
  *{animation:none!important; transition:none!important}
}
</style>
</head>
<body data-color="cherry">

<canvas id="fx"></canvas>

<button id="bgmBtn" aria-label="播放音乐">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
</button>

<div id="cover">
  <div class="mascot" id="coverMascot"></div>
  <h1>Hi <b id="coverName"></b></h1>
  <div class="sub" id="coverSub">有一封贺卡待开启</div>
  <button id="openBtn">轻触开启</button>
</div>

<div id="stage">
  <div class="page">
    <div class="head-mascot reveal" id="headMascot"></div>
    <div class="title-en en reveal" id="titleEn"></div>
    <div class="title-cn reveal" id="titleCn"></div>
    <div class="to-line reveal" id="toLine"></div>

    <div class="letter reveal">
      <div class="text" id="blessing"></div>
      <div class="from" id="fromLine"></div>
    </div>

    <div class="photos" id="photos"></div>

    <div class="ending reveal">
      <div class="mini" id="endMascot"></div>
      <div class="en" id="endEn"></div>
      <p id="endCn"></p>
    </div>
  </div>
</div>

<div class="notice" id="notice">
  <div class="mascot" id="noticeMascot"></div>
  <h2 id="noticeTitle"></h2>
  <p id="noticeText"></p>
</div>

/* 主题文案与氛围粒子 */
const THEMES = {
  birthday:{ en:"Happy Birthday", cnDefault:"生日快乐", sub:"有一份生日惊喜待开启",
             endEn:"Make a wish", endCn:"愿所有美好如期而至", fx:"confetti" },
  love:{     en:"For You",        cnDefault:"心动签收", sub:"有一封心意待开启",
             endEn:"Love you",    endCn:"往后的日子,都想和你一起", fx:"hearts" },
  starry:{   en:"Good Night",     cnDefault:"温柔晚安", sub:"有一片星空为你点亮",
             endEn:"Sweet dreams",endCn:"今晚的星星,都替我看着你", fx:"stars" }
};

/* ================= 读取卡片数据 ================= */
function getParam(k){ return new URLSearchParams(location.search).get(k); }

async function loadConfig(){
  // 预览模式:生成器通过 #cfg= 传入 base64 配置
  if(location.hash.startsWith("#cfg=")){
    try{
      const raw = decodeURIComponent(escape(atob(location.hash.slice(5))));
      return JSON.parse(raw);
    }catch(e){ console.error(e); }
  }
  const id = getParam("id") || "demo";
  if(!/^[a-zA-Z0-9_-]{1,32}$/.test(id)) throw new Error("bad id");
  const res = await fetch(`data/${id}.json?t=${Date.now()}`);
  if(!res.ok) throw new Error("not found");
  const cfg = await res.json();
  cfg.__id = id;
  return cfg;
}

function esc(s){ const d=document.createElement("div"); d.textContent=s||""; return d.innerHTML; }

function showNotice(title, text, theme){
  const t = THEMES[theme] ? theme : "birthday";
  document.getElementById("noticeMascot").innerHTML = SVGS[t];
  document.getElementById("noticeTitle").textContent = title;
  document.getElementById("noticeText").textContent = text;
  document.getElementById("notice").style.display = "flex";
  document.getElementById("cover").style.display = "none";
}

/* ================= 渲染 ================= */
let CFG=null;
loadConfig().then(cfg=>{
  CFG = cfg;
  const theme = THEMES[cfg.theme] ? cfg.theme : "birthday";
  const T = THEMES[theme];
  document.body.dataset.color = cfg.color || "cherry";

  // 有效期
  if(cfg.expireAt && Date.now() > new Date(cfg.expireAt).getTime()){
    showNotice("这张贺卡已过期", "贺卡有效期已结束。\n如需续期或重新制作,请联系赠送人。", theme);
    return;
  }

  // 封面
  document.getElementById("coverMascot").innerHTML = SVGS[theme];
  document.getElementById("coverName").textContent = cfg.to || "朋友";
  document.getElementById("coverSub").textContent = cfg.coverSub || T.sub;

  // 正文
  document.getElementById("headMascot").innerHTML = SVGS[theme];
  document.getElementById("titleEn").textContent = T.en;
  document.getElementById("titleCn").textContent = cfg.title || T.cnDefault;
  document.getElementById("toLine").textContent = `致 亲爱的 ${cfg.to || "你"}`;
  document.getElementById("fromLine").innerHTML = cfg.from ? `来自<b>${esc(cfg.from)}</b>` : "";
  document.getElementById("endMascot").innerHTML = SVGS[theme];
  document.getElementById("endEn").textContent = T.endEn;
  document.getElementById("endCn").textContent = cfg.endText || T.endCn;

  // 照片
  const box = document.getElementById("photos");
  (cfg.photos||[]).slice(0,9).forEach(src=>{
    const d = document.createElement("div");
    d.className = "polaroid";
    const img = document.createElement("img");
    img.src = src; img.alt = "";
    d.appendChild(img); box.appendChild(d);
  });

  // BGM
  if(cfg.bgm){
    const a = new Audio(cfg.bgm); a.loop = true; window.__bgm = a;
    const btn = document.getElementById("bgmBtn");
    btn.style.display = "flex";
    btn.onclick = ()=>{ a.paused ? (a.play(), btn.classList.add("spin"))
                                 : (a.pause(), btn.classList.remove("spin")); };
  }

  // 开启
  document.getElementById("openBtn").onclick = ()=>{
    document.getElementById("cover").classList.add("gone");
    if(window.__bgm){ window.__bgm.play().then(()=>document.getElementById("bgmBtn").classList.add("spin")).catch(()=>{}); }
    startFx(T.fx);
    setTimeout(()=>{ revealAll(); typeBlessing(cfg.blessing || "祝你天天开心!"); }, 500);
  };
}).catch(()=>{
  showNotice("没有找到这张贺卡", "链接可能不完整,或贺卡尚未生成。\n请联系赠送人确认。", "birthday");
});

/* 渐入 */
function revealAll(){
  const els = document.querySelectorAll(".reveal");
  els.forEach((el,i)=> setTimeout(()=>el.classList.add("in"), i*180));
}

/* 打字机 */
function typeBlessing(text){
  const box = document.getElementById("blessing");
  const caret = document.createElement("span"); caret.className="caret";
  box.appendChild(caret);
  let i=0;
  (function step(){
    if(i < text.length){
      caret.insertAdjacentText("beforebegin", text[i++]);
      setTimeout(step, /[\n。!!,,、]/.test(text[i-1]) ? 260 : 95);
    } else { setTimeout(()=>caret.remove(), 4000); }
  })();
}

/* ================= 氛围粒子 ================= */
function startFx(kind){
  const cv = document.getElementById("fx"), ctx = cv.getContext("2d");
  let W,H; const resize=()=>{W=cv.width=innerWidth*devicePixelRatio;H=cv.height=innerHeight*devicePixelRatio;};
  resize(); addEventListener("resize",resize);
  const accent = getComputedStyle(document.body).getPropertyValue("--accent").trim();
  const colors = [accent, "#ffce54", "#ffffff"];
  const N = kind==="confetti" ? 70 : 40;
  const ps = Array.from({length:N}, ()=>spawn(true));

  function spawn(init){
    const r = (a,b)=>a+Math.random()*(b-a);
    return {
      x:r(0,W), y:init?r(0,H):(kind==="hearts"?H+20*devicePixelRatio:-20*devicePixelRatio),
      s:r(6,14)*devicePixelRatio, v:r(.4,1.4)*devicePixelRatio,
      drift:r(-.5,.5)*devicePixelRatio, rot:r(0,Math.PI*2), vr:r(-.03,.03),
      c:colors[Math.floor(Math.random()*colors.length)], a:r(.4,.95)
    };
  }
  function heart(ctx,s){ ctx.beginPath();
    ctx.moveTo(0,s*.3); ctx.bezierCurveTo(-s,-s*.5,-s*.5,-s*1.1,0,-s*.4);
    ctx.bezierCurveTo(s*.5,-s*1.1,s,-s*.5,0,s*.3); ctx.fill(); }
  function star(ctx,s){ ctx.beginPath();
    for(let i=0;i<5;i++){ const a=-Math.PI/2+i*2*Math.PI/5, b=a+Math.PI/5;
      ctx.lineTo(Math.cos(a)*s,Math.sin(a)*s); ctx.lineTo(Math.cos(b)*s*.45,Math.sin(b)*s*.45); }
    ctx.closePath(); ctx.fill(); }

  (function loop(){
    ctx.clearRect(0,0,W,H);
    ps.forEach((p,i)=>{
      p.rot+=p.vr; p.x+=p.drift;
      if(kind==="hearts"){ p.y-=p.v; if(p.y<-30) ps[i]=spawn(false); }
      else { p.y+=p.v; if(p.y>H+30) ps[i]=spawn(false); }
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.globalAlpha=p.a; ctx.fillStyle=p.c;
      if(kind==="confetti") ctx.fillRect(-p.s/2,-p.s/4,p.s,p.s/2);
      else if(kind==="hearts") heart(ctx,p.s*.7);
      else star(ctx,p.s*.5);
      ctx.restore();
    });
    requestAnimationFrame(loop);
  })();
}
</script>
